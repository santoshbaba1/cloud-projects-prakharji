name: repo-checks

# Keeps the repo structure honest: valid links, fresh catalog, required project files.
# All checks are pure-stdlib Python — no dependencies to install.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Markdown links resolve
        run: python3 scripts/check-markdown-links.py

      - name: Project structure is valid
        run: python3 scripts/check-required-files.py

      - name: PROJECT-CATALOG.md is up to date
        run: python3 scripts/generate-project-catalog.py --check

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
