# Sample GitHub Actions workflow — deploy the app to the EC2 fleet via SSM.
#
# This file is a TEMPLATE for learners to copy into the .github/workflows/ folder
# of their OWN application repository. It will not run inside the cloud-projects
# repo (GitHub only runs workflows from the repo root .github/workflows/).
#
# It uses GitHub OIDC federation (no long-lived AWS keys) — the same pattern from
# the iam-roles-and-policies project — and AWS Systems Manager Run Command to push
# code to every running instance, with zero SSH and no open port 22.
#
# Prerequisites (created in Step 10):
#   • An IAM role the GitHub repo can assume via OIDC (role-to-assume below)
#   • The EC2 instances run the SSM agent and have an instance profile with
#     AmazonSSMManagedInstanceCore
name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ASG_TAG: webapp        # instances tagged Project=webapp receive the deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate app before deploying
        run: |
          python -m pip install -r src/requirements.txt
          python src/test_app.py

      - name: Push code to S3 (deploy artifact)
        run: |
          aws s3 sync src/ s3://<DEPLOY_BUCKET>/app/ --delete

      - name: Roll out to instances via SSM Run Command
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Project,Values=${ASG_TAG}" \
            --comment "Deploy ${{ github.sha }}" \
            --parameters commands='[
              "aws s3 sync s3://<DEPLOY_BUCKET>/app/ /opt/webapp/",
              "python3 -m pip install -r /opt/webapp/requirements.txt",
              "systemctl restart webapp.service"
            ]' \
            --region ${AWS_REGION}
