apiVersion: v1
kind: ServiceAccount
metadata:
  name: s3-reader
  namespace: apps
  annotations:
    # This single annotation is what links the Kubernetes ServiceAccount to the
    # IAM role. Replace <ACCOUNT_ID> after you create the role in Step 4.
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/IrsaS3ReaderRole
