apiVersion: v1
kind: Pod
metadata:
  name: irsa-test
  namespace: apps
spec:
  serviceAccountName: s3-reader        # <-- run AS the IRSA-enabled ServiceAccount
  containers:
    - name: awscli
      image: amazon/aws-cli:latest
      command: ["sleep", "3600"]       # keep it alive so we can exec in and test
  restartPolicy: Never
