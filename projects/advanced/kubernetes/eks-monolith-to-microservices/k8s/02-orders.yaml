# orders microservice — Deployment + internal Service + config.
# CATALOG_URL comes from a ConfigMap (Twelve-Factor: config in the environment).
apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-config
  namespace: shop
data:
  CATALOG_URL: "http://catalog.shop.svc.cluster.local:80"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: shop
  labels: { app: orders }
spec:
  replicas: 2
  selector:
    matchLabels: { app: orders }
  template:
    metadata:
      labels: { app: orders }
    spec:
      containers:
        - name: orders
          image: <account>.dkr.ecr.us-east-1.amazonaws.com/shop-orders:1
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: orders-config }
          env:
            - name: APP_VERSION
              value: orders-1.0
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: orders            # DNS: orders.shop.svc.cluster.local
  namespace: shop
spec:
  selector: { app: orders }
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
