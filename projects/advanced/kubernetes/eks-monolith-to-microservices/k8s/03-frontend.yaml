# frontend microservice — the only service exposed outside the cluster.
# A type=LoadBalancer Service provisions an AWS ELB and gives you a public hostname.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shop
  labels: { app: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: <account>.dkr.ecr.us-east-1.amazonaws.com/shop-frontend:1
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: frontend-1.0
            - name: CATALOG_URL
              value: "http://catalog.shop.svc.cluster.local:80"
            - name: ORDERS_URL
              value: "http://orders.shop.svc.cluster.local:80"
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: shop
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer      # provisions an ELB; gives an external hostname
