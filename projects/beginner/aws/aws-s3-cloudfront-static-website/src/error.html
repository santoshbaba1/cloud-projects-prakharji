<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #232f3e;
      color: #fff;
    }
    .card { text-align: center; max-width: 480px; padding: 40px; }
    h1 { font-size: 4rem; margin: 0; color: #ff9900; }
    p { line-height: 1.5; opacity: 0.9; }
    a { color: #ff9900; }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <p>The page you asked for isn't here.</p>
    <p>This custom error page is served by CloudFront whenever the requested
       object can't be found in the S3 origin.</p>
    <p><a href="/">← Back to home</a></p>
  </div>
</body>
</html>
