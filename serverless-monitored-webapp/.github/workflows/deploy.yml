# Sample GitHub Actions workflow — deploy the Lambda function.
#
# This file is a TEMPLATE to copy into the .github/workflows/ folder of your OWN
# application repository. It will not run inside the cloud-projects repo (GitHub
# only runs workflows from a repo's root .github/workflows/).
#
# Like the EC2 project, it uses GitHub OIDC (no stored AWS keys). The deploy is a
# zip-and-update-function-code — the simplest serverless deploy. For larger apps,
# graduate to AWS SAM or the AWS CDK (see challenges.md).
#
# Prerequisites (created in Step 07):
#   • A GitHub OIDC provider in IAM
#   • A role the repo can assume with lambda:UpdateFunctionCode on the function
name: Deploy Lambda

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  FUNCTION_NAME: serverless-webapp

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate handler before deploying
        run: python src/test_app.py

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/GitHubLambdaDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Package function
        run: |
          cd src
          zip -r ../function.zip app.py
          cd ..

      - name: Update function code
        run: |
          aws lambda update-function-code \
            --function-name ${FUNCTION_NAME} \
            --zip-file fileb://function.zip \
            --region ${AWS_REGION}

      - name: Wait for the update to finish
        run: |
          aws lambda wait function-updated \
            --function-name ${FUNCTION_NAME} \
            --region ${AWS_REGION}
